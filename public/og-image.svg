<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Icon -->
  <rect x="100" y="100" width="80" height="80" rx="16" fill="url(#blueGradient)"/>
  <text x="140" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">M</text>
  
  <!-- Brand Name -->
  <text x="200" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#1e293b">AIRPORT</text>
  <text x="375" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#3b82f6">MATRIX</text>
  
  <!-- Main Title -->
  <text x="100" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#1e293b">Airport Showers,</text>
  <text x="100" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#blueGradient)">Storage &amp; Sleeping</text>
  <text x="100" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#1e293b">Pods</text>
  
  <!-- Subtitle -->
  <text x="100" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#64748b">Find facilities at major airports worldwide</text>
  
  <!-- Service Icons Row -->
  <g transform="translate(750, 200)">
    <!-- Showers -->
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#dbeafe"/>
    <text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#3b82f6" text-anchor="middle">Showers</text>
    <path d="M45 35v15h.87m23.02 6a12 12 0 0 0-23.02-6m0 0H50m27.5 27.5v-15h-.73m0 0a12 12 0 0 1 23.02 6m-23.02-6H65" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Storage -->
    <rect x="150" y="0" width="120" height="120" rx="20" fill="#e0e7ff"/>
    <text x="210" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#6366f1" text-anchor="middle">Storage</text>
    <path d="M175 35l-15 7.5v37.5l15 7.5 15-7.5V42.5l-15-7.5zm0 0v37.5m15-30l-15 7.5m0 0l-15-7.5" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Sleeping -->
    <rect x="300" y="0" width="120" height="120" rx="20" fill="#f3e8ff"/>
    <text x="360" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#9333ea" text-anchor="middle">Sleeping</text>
    <path d="M335 45v30h30V55a5 5 0 0 0-5-5h-10l-5-5h-10z" stroke="#9333ea" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- URL -->
  <text x="1100" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#94a3b8" text-anchor="end">www.airportmatrix.com</text>
</svg>